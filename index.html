<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Road Pathfinding</title>

        <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>" />
        <link rel="stylesheet" href="css/style.css" />
    </head>

    <body>
        <div id="loading">
            <div class="loading-icon">🗺️</div>
            <div class="loading-text">Road Pathfinding</div>
            <div class="loading-bar-wrap">
            <div class="loading-bar"></div>
            </div>
            <div class="loading-sub">Dijkstra Algorithm Visualizer</div>
        </div>

        <!-- Mount point aplikasi -->
        <div id="app"></div>
        <script type="module" src="js/main.js"></script>

        <!-- Sembunyikan loading screen setelah semua modul siap -->
        <script type="module">
            window.addEventListener('load', () => {
            const loading = document.getElementById('loading');
            if (!loading) return;
            loading.style.opacity = '0';
            setTimeout(() => loading.remove(), 450);
            });
        </script>

        <!-- Cegah context menu klik kanan di canvas -->
        <script>
            document.addEventListener('contextmenu', e => {
            if (e.target.tagName === 'CANVAS') e.preventDefault();
            });
        </script>

    </body>
</html>
